networks:
  wheatmall_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

services:
  postgres:
    image: postgres:17-alpine
    container_name: nacos-postgres
    environment:
      - POSTGRES_DB=nacos
      - POSTGRES_USER=faris
      - POSTGRES_PASSWORD=123456
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      wheatmall_net:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faris -d nacos"]
      interval: 5s
      timeout: 5s
      retries: 5

  nacos:
    image: nacos/nacos-server:v3.1.1
    container_name: nacos-standalone
    environment:
      - PREFER_HOST_MODE=hostname
      - MODE=standalone
      - NACOS_AUTH_TOKEN=U2VjcmV0S2V5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MA==
      - NACOS_AUTH_IDENTITY_KEY=serverIdentity
      - NACOS_AUTH_IDENTITY_VALUE=security
    volumes:
      - ./conf/application.properties:/home/nacos/conf/application.properties
      - ./nacos-server.jar:/home/nacos/target/nacos-server.jar
      - ./plugins:/home/nacos/plugins
      - ./logs:/home/nacos/logs
    ports:
      - "8848:8848"
      - "8080:8080"
      - "9848:9848"
    networks:
      wheatmall_net:
        ipv4_address: 172.20.0.11
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
