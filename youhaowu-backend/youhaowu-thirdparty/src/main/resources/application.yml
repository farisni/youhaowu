server:
  port: 8095

spring:
  application:
    name: youhaowu-thirdparty
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.8.112:8848
        namespace: public
        group: DEFAULT_GROUP
        register-enabled: true
    alicloud:
      access-key: your-access-key
      secret-key: your-secret-key
      oss:
        endpoint: oss-cn-hangzhou.aliyuncs.com
        bucket: youhaowu
      sms:
        region: cn-hangzhou
        endpoint: dysmsapi.aliyuncs.com
        signName: 小麦商城
        templateCode: SMS_123456789

logging:
  file:
    path: /tmp
  level:
    com.youhaowu.thirdparty: debug
