server:
  port: 8094

spring:
  application:
    name: youhaowu-search
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.8.112:8848
        namespace: public
        group: DEFAULT_GROUP
        register-enabled: true
  thymeleaf:
    cache: false
  session:
    store-type: redis

ES:
  host: 192.168.8.112
  port: 9200

logging:
  file:
    path: /tmp
  level:
    com.youhaowu.search: debug

  kafka:
    bootstrap-servers: 192.168.8.112:9092
    consumer:
      group-id: youhaowu-search-up
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
